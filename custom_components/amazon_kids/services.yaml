pause:
  name: Pause
  description: >-
    Pause (set off-screen time for) the targeted Amazon Kids Pause button's
    child(ren) for a custom duration. Target a Pause button entity (e.g.
    button.alex_pause or button.all_kids_pause).
  target:
    entity:
      integration: amazon_kids
      domain: button
  fields:
    minutes:
      name: Minutes
      description: >-
        How long to pause, as a one-off override. Omit to use the paired
        Pause Duration select entity's current preset instead (e.g.
        select.alex_pause_duration).
      required: false
      example: 120
      selector:
        number:
          min: 1
          max: 1440
          unit_of_measurement: minutes
          mode: box

resume:
  name: Resume
  description: >-
    Clear the off-screen override for the targeted Amazon Kids Resume
    button's child(ren) (e.g. button.alex_resume or button.all_kids_resume).
  target:
    entity:
      integration: amazon_kids
      domain: button
